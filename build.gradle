plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.junit.platform:junit-platform-suite-api:1.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-suite-engine:1.10.0'

    // Cucumber with JUnit 5
    testImplementation 'io.cucumber:cucumber-java:7.15.0'
    testImplementation 'io.cucumber:cucumber-junit-platform-engine:7.15.0'

    // Selenium (For Browser Automation)
    testImplementation 'org.seleniumhq.selenium:selenium-java:4.11.0'

    // JUnit 4 Assert (for compatibility)
    testImplementation 'junit:junit:4.13.2'

    // RestAssured (For API testing)
    testImplementation 'io.rest-assured:rest-assured:5.4.0'

    // Log4j (For Logging)
    testImplementation 'org.apache.logging.log4j:log4j-core:2.20.0'
    testImplementation 'org.apache.logging.log4j:log4j-api:2.20.0'

    // ReportPortal (for integration with ReportPortal)
    testImplementation 'com.epam.reportportal:logger-java-log4j:5.0.2'

    // JUnit 5
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
}

test {
    useJUnitPlatform()
}